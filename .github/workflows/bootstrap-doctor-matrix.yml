# Continuously validates this template's bootstrap pipeline. Three jobs:
#
#   doctor                    — full e2e probe of bin/doctor.rb + bin/lib/bootstrap.rb
#                               across the 2×2 matrix of GENERATOR × RELEASE_MODE
#                               (xcodegen|tuist × ci|local), against real GH +
#                               Apple state via the smoketest fork. Catches
#                               schema breaks, mode-branching bugs, side state
#                               drift. Runs on Mondays 07:00 UTC.
#
#   parser-regression         — hermetic test of Bootstrap::Config.parse against
#                               a fixture that mimics the .bootstrap.env.example
#                               shape (every value followed by inline `# comment`).
#                               Catches regression of #108's BLOCKER 2.
#
#   bundle-guard-regression   — runs `make doctor` on a fresh checkout WITHOUT
#                               `bundle install`. Asserts friendly-error path
#                               (`Ruby gems aren't installed yet`) instead of
#                               a Bundler::GemNotFound stack trace. Catches
#                               regression of #108's BLOCKER 1.
#
# What this workflow does NOT prove: that `make bootstrap-fork` mints fresh
# certs from cold, that `make ship` produces a working TestFlight build.
# Those are destructive and require Apple-side resource churn (cert quotas,
# ASC App records). For the full destructive E2E, run bin/refork-smoketest.sh
# manually — see docs/CONTINUOUS-VALIDATION.md.
#
# `doctor` job inputs come from GH Secrets on this template repo, never from
# a local .bootstrap.env. The workflow materializes .bootstrap.env at runtime
# in /tmp on the runner and never persists it as an artifact. The two
# regression jobs are hermetic: no secrets, no smoketest needed.

name: bootstrap doctor matrix

on:
  schedule:
    - cron: '0 7 * * 1' # Mondays 07:00 UTC — read-only sweep after the Sat (local-mode) + Sun (CI-mode) canary ships. All three at 07:00 UTC for memorability.
  workflow_dispatch:
  pull_request:
    paths:
      - 'test/parser_test.rb'
      - 'Makefile'
      - '.github/workflows/bootstrap-doctor-matrix.yml'
      - 'bin/lib/bootstrap.rb'
      - 'bin/doctor.rb'
      - 'bin/bootstrap-fork.rb'
      - 'bin/ship.rb'
      - 'bin/verify-testflight.rb'
      - 'bin/init-bootstrap-env.sh'
      - '.bootstrap.env.example'
      - 'bin/mint-local-certs.rb'
      - 'fastlane/Fastfile'

permissions:
  contents: read

# Serialize per-ref runs. Cron-triggered runs share group `bootstrap-doctor-main`
# with any push/dispatch on main; PR-triggered runs use the PR ref so they can
# proceed in parallel with cron. cancel-in-progress: true keeps PR-only runs
# fresh; cron runs effectively never overlap (they take ~5min, fire weekly).
concurrency:
  group: bootstrap-doctor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doctor:
    # Skip on forks: this workflow references indiagrams/ios-macos-smoketest
    # by hardcoded path and uses secrets configured only on this repo. On any
    # other repo it would fail at the secrets-write step or produce meaningless
    # results. Skipped runs surface as a single grey check, not red errors.
    #
    # Skip on Dependabot PRs: Dependabot-triggered workflow runs don't expose
    # the repo's Actions secrets (GitHub security policy — secrets live in a
    # parallel Dependabot secret store, populated separately via Settings →
    # Security → Dependabot → secrets). Without ASC_API_KEY_ID, FASTLANE_TEAM_ID,
    # ASC_API_KEY_P8_BASE64, MATCH_PASSWORD, MATCH_GIT_BASIC_AUTHORIZATION, and
    # KEYCHAIN_PASSWORD the `.bootstrap.env` materialization step writes empty
    # values and every matrix cell fails the doctor schema check with
    # `.bootstrap.env is missing required fields (RELEASE_MODE=ci): FASTLANE_TEAM_ID,
    # ASC_API_KEY_ID, ASC_API_KEY_ISSUER_ID`. The scheduled Monday 07:00 UTC run
    # (using the repo's normal Actions secrets) and any post-merge manual
    # `workflow_dispatch` re-run cover post-merge verification of action-version
    # bumps. Maintainers who want PR-time doctor coverage on Dependabot bumps
    # can populate the parallel Dependabot secret store with the same 6 secrets.
    if: github.repository == 'indiagrams/apple-shipkit' && github.actor != 'dependabot[bot]'
    runs-on: macos-15
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        generator:    [xcodegen, tuist]
        release_mode: [ci, local]

    steps:
      - name: Checkout template (this repo)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: template

      - name: Clone smoketest (the test target)
        # Public repo; no auth needed. We use the smoketest as a known-state
        # fork to probe doctor against.
        run: |
          git clone --depth=20 https://github.com/indiagrams/ios-macos-smoketest.git smoketest
          ( cd smoketest && git log --oneline -1 )

      - name: Inject this template's bootstrap code into the smoketest checkout
        # The smoketest carries the bootstrap code that was current at its
        # last sync. We want to validate THIS pull request's bootstrap code
        # against the smoketest's runtime state. Replace the smoketest's
        # bin/lib/bootstrap.rb + bin/doctor.rb + bin/bootstrap-fork.rb +
        # bin/ship.rb + bin/verify-testflight.rb + bin/init-bootstrap-env.sh
        # with the template's versions.
        run: |
          mkdir -p smoketest/bin/lib
          cp template/bin/lib/bootstrap.rb smoketest/bin/lib/
          cp template/bin/{doctor.rb,bootstrap-fork.rb,ship.rb,verify-testflight.rb,init-bootstrap-env.sh} smoketest/bin/
          chmod +x smoketest/bin/{doctor.rb,bootstrap-fork.rb,ship.rb,verify-testflight.rb,init-bootstrap-env.sh}
          cp template/.bootstrap.env.example smoketest/

      - name: Set up Ruby + bundler cache (in smoketest)
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: smoketest

      - name: Install xcodegen + tuist (so BrewBootstrap step's `which` checks pass)
        run: |
          # Idempotent — brew skips already-installed.
          brew install xcodegen 2>&1 | tail -3
          brew install --cask tuist 2>&1 | tail -3

      - name: Materialize secrets to mode-0600 files outside the workspace
        env:
          ASC_API_KEY_P8_BASE64:         ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          MATCH_PASSWORD:                ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          KEYCHAIN_PASSWORD:             ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          SECRETS_DIR="${RUNNER_TEMP}/bootstrap-secrets"
          mkdir -p "$SECRETS_DIR"
          chmod 700 "$SECRETS_DIR"

          # ASC API .p8 (decode the base64 to PEM)
          printf '%s' "$ASC_API_KEY_P8_BASE64" | base64 -d > "$SECRETS_DIR/AuthKey.p8"

          # MATCH_GIT_BASIC_AUTHORIZATION = base64("user:PAT") — extract just the PAT
          # for GH_PAT_FILE consumption.
          printf '%s' "$MATCH_GIT_BASIC_AUTHORIZATION" | base64 -d | cut -d: -f2- > "$SECRETS_DIR/pat"

          printf '%s' "$MATCH_PASSWORD"    > "$SECRETS_DIR/match-password"
          printf '%s' "$KEYCHAIN_PASSWORD" > "$SECRETS_DIR/keychain-password"

          chmod 600 "$SECRETS_DIR"/*

          echo "SECRETS_DIR=$SECRETS_DIR" >> "$GITHUB_ENV"

      - name: Use the certs-repo PAT for `gh api` calls (bootstrap.rb probes private repo)
        # The default GITHUB_TOKEN can't see the private smoketest-certs repo.
        # Override `gh`'s auth with the PAT extracted above so probes succeed.
        run: |
          echo "GH_TOKEN=$(cat $SECRETS_DIR/pat)" >> "$GITHUB_ENV"

      - name: Materialize .bootstrap.env from non-secret config + secret file paths
        env:
          GENERATOR:             ${{ matrix.generator }}
          RELEASE_MODE:          ${{ matrix.release_mode }}
          FASTLANE_TEAM_ID:      ${{ secrets.FASTLANE_TEAM_ID }}
          ASC_API_KEY_ID:        ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          cat > smoketest/.bootstrap.env <<EOF
          APP_NAME=SmokeApp
          BUNDLE_ID=com.indiagram.smoke-app
          DISPLAY_NAME='Indiagram Smoke App'
          APP_EMAIL=smoketest@indiagram.com
          GENERATOR=$GENERATOR
          RELEASE_MODE=$RELEASE_MODE
          FASTLANE_TEAM_ID=$FASTLANE_TEAM_ID
          ASC_API_KEY_ID=$ASC_API_KEY_ID
          ASC_API_KEY_ISSUER_ID=$ASC_API_KEY_ISSUER_ID
          ASC_API_KEY_P8_PATH=$SECRETS_DIR/AuthKey.p8
          GH_ORG=indiagrams
          GH_APP_REPO=ios-macos-smoketest
          GH_CERTS_REPO=ios-macos-smoketest-certs
          GH_PAT_FILE=$SECRETS_DIR/pat
          MATCH_PASSWORD_FILE=$SECRETS_DIR/match-password
          KEYCHAIN_PASSWORD_FILE=$SECRETS_DIR/keychain-password
          ICON_1024_PATH=
          ASC_APP_SKU=indiagram-smoke-001
          ASC_APP_NAME=Indiagram Smoke App
          EOF
          # Print without secrets for log clarity
          grep -vE "^(ASC_API_KEY_ID|ASC_API_KEY_ISSUER_ID|FASTLANE_TEAM_ID)=" smoketest/.bootstrap.env || true

      - name: Run make doctor
        working-directory: smoketest
        # ci cells expect exit 0 (everything in place — smoketest is fully bootstrapped).
        # local cells expect exit 2 (LocalKeychainCerts blocks because the runner has
        #   no Apple Distribution + Apple Development + 3rd Party Mac Developer
        #   Installer in its login keychain — that's CORRECT behavior; doctor is
        #   honestly reporting that local-mode signing won't work without the
        #   identities). Exit 1 (Ruby crash) fails the test in either mode.
        # The smoketest's checked-out Makefile may predate the new targets,
        # so invoke the doctor script directly via `bundle exec ruby`. This
        # exercises the same Ruby code `make doctor` would invoke.
        run: |
          set +e
          bundle exec ruby bin/doctor.rb
          rc=$?
          set -e
          mode="${{ matrix.release_mode }}"
          case "$mode/$rc" in
            ci/0)        echo "::notice::ci cell green (rc=0)" ;;
            local/0|local/2)
              echo "::notice::local cell acceptable (rc=$rc)" ;;
            *)
              echo "::error::doctor unexpected rc=$rc in mode=$mode"
              exit 1
              ;;
          esac

      - name: Tear down secrets
        if: always()
        run: rm -rf "$SECRETS_DIR" || true

  # Hermetic regression test for the .bootstrap.env parser. Runs against a
  # fixture that mimics the .bootstrap.env.example shape — every value
  # followed by an inline `# comment`. Catches regressions of #108's
  # BLOCKER 2 (parser kept inline comments as part of values, breaking
  # every downstream Apple/GH probe). No secrets, no smoketest needed:
  # the parser is platform-agnostic and tested in isolation.
  parser-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          ruby-version: '3.3'
          bundler-cache: false  # parser_test.rb is stdlib-only; no bundle exec needed
      - name: Run parser regression fixtures
        run: ruby test/parser_test.rb

  # Regression test for #108's BLOCKER 1: `make doctor` crashed with a
  # Bundler::GemNotFound stack trace on a fresh fork because no path in
  # the README's onboarding ran `bundle install` first. The fix added a
  # `_check-bundle` Makefile guard that prints a friendly hint instead.
  # This job exercises the friendly-failure path by deliberately NOT
  # installing project gems before running `make doctor`.
  bundle-guard-regression:
    runs-on: macos-15
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          ruby-version: '3.3'
          bundler-cache: false  # the whole point: gems NOT installed
      - name: Confirm test setup (project gems should be missing)
        run: |
          if bundle check >/dev/null 2>&1; then
            echo "::error::Test setup error: bundle check passed; this job needs gems missing"
            exit 1
          fi
          echo "OK — bundle check fails as expected (gems missing)"
      - name: make doctor exits cleanly with friendly message (no Ruby crash)
        run: |
          set +e
          out=$(make doctor 2>&1)
          rc=$?
          set -e
          echo "exit_code=$rc"
          echo "--- output ---"
          echo "$out"
          echo "--- end ---"
          # 1. Friendly bundle-guard message must be present.
          echo "$out" | grep -qF "Ruby gems aren't installed yet" || {
            echo "::error::Friendly bundle-guard message missing — _check-bundle target may have been removed or renamed"
            exit 1
          }
          # 2. Both remediation hints must be present.
          echo "$out" | grep -qF "bundle install" || {
            echo "::error::'bundle install' remediation hint missing"
            exit 1
          }
          echo "$out" | grep -qF "make bootstrap" || {
            echo "::error::'make bootstrap' remediation hint missing"
            exit 1
          }
          # 3. No Ruby stack-trace leakage.
          if echo "$out" | grep -qE 'Bundler::GemNotFound|cannot load such file|spec_set\.rb'; then
            echo "::error::Ruby stack trace leaked through bundle guard — regression of #108 BLOCKER 1"
            exit 1
          fi
          # 4. Non-zero exit (fail-fast, not silent pass-through).
          if [ "$rc" -eq 0 ]; then
            echo "::error::Expected non-zero exit, got rc=0 — _check-bundle guard didn't fire"
            exit 1
          fi
          echo "OK — friendly guard message + non-zero exit + no stack trace"
