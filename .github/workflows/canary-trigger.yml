name: canary-trigger

# Weekly canary release of indiagrams/ios-macos-smoketest, driven from upstream.
#
# Why this lives here (apple-shipkit) instead of in the smoketest itself:
#   The smoketest is a "living reference implementation" that fresh forks copy.
#   Putting an active `schedule:` cron in the smoketest's release.yml would
#   make it diverge from a fresh fork's shape. The trigger logically belongs
#   with the upstream maintainer (where the goal-setting happens); the actual
#   ship still happens on the smoketest (where the credentials, bundle ID,
#   ASC app record, and certs live).
#
# Failure semantics:
#   This workflow polls the dispatched run to completion and inherits its
#   conclusion. If the smoketest's release goes red, this workflow goes red,
#   so the failure surfaces on apple-shipkit's Actions tab — where the
#   maintainer is watching.
#
# Secret required:
#   SMOKETEST_DISPATCH_PAT — fine-grained PAT scoped to indiagrams/ios-macos-smoketest
#                            with `Actions: Read and write` only.

on:
  schedule:
    - cron: '0 7 * * 6'   # Saturdays 07:00 UTC — single weekly canary cron; dispatches BOTH the CI-mode (release.yml) and local-mode (canary-local-mode.yml) ships on the smoketest in sequence. Doctor-matrix regression jobs fire Mon 07:00 UTC.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dispatch with dry_run=true on the smoketest (build+sign only, no upload, no tag)'
        required: false
        type: boolean
        default: false
      platforms:
        description: 'Platforms to ship (comma-separated subset of ios,macos). Threaded to release.yml as the platforms input.'
        required: false
        type: string
        default: 'ios,macos'

permissions:
  contents: read

concurrency:
  group: canary-trigger
  cancel-in-progress: false

jobs:
  dispatch:
    # Skip on forks: this workflow dispatches release.yml on
    # indiagrams/ios-macos-smoketest using SMOKETEST_DISPATCH_PAT — both
    # specific to this repo. Forks have neither the target repo permissions
    # nor the secret, so a fork run would fail at the PAT-verify step.
    # Skipped runs surface as a single grey check, not red errors.
    if: github.repository == 'indiagrams/apple-shipkit'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      # Three sequential cells weekly so every canary surface gets exercised:
      #   1. CI-mode xcodegen ship (dispatches smoketest's release.yml)
      #   2. CI-mode tuist ship    (dispatches smoketest's release.yml)
      #   3. Local-mode ship       (dispatches canary-local-mode.yml, which
      #                             internally iterates both generators)
      # max-parallel=1 forces sequential dispatch. Apple's 3-distribution-cert
      # quota is enough headroom for 1 outstanding cert at a time, and the
      # timestamp-based `locate` step needs an unambiguous baseline per cell.
      # fail-fast=false ensures the local-mode cell still runs even if a
      # CI-mode cell fails (or vice versa).
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - { name: "CI-mode ship (xcodegen)",  target: release.yml,           generator: xcodegen }
          - { name: "CI-mode ship (tuist)",     target: release.yml,           generator: tuist }
          - { name: "Local-mode ship",          target: canary-local-mode.yml, generator: "" }

    name: ${{ matrix.name }}

    env:
      TARGET_REPO: indiagrams/ios-macos-smoketest
      TARGET_WORKFLOW: ${{ matrix.target }}
      TARGET_REF: main
      GH_TOKEN: ${{ secrets.SMOKETEST_DISPATCH_PAT }}
      GENERATOR: ${{ matrix.generator }}
      PLATFORMS: ${{ inputs.platforms || 'ios,macos' }}

    steps:
      - name: Verify dispatch PAT is set
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::SMOKETEST_DISPATCH_PAT secret is not set on this repo."
            echo "Mint a fine-grained PAT scoped to ${TARGET_REPO} with Actions: Read and write,"
            echo "then store it as SMOKETEST_DISPATCH_PAT."
            exit 1
          fi
          echo "PAT present (${#GH_TOKEN} chars)"

      - name: Capture dispatch baseline timestamp
        id: baseline
        run: |
          # Used to filter the runs list — we look for runs created strictly
          # after this point. Runner UTC vs api.github.com is NTP-synced to
          # within seconds, well inside our 5s poll window.
          baseline=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "baseline=${baseline}" >> "${GITHUB_OUTPUT}"
          echo "Baseline (only runs created after this count): ${baseline}"

      - name: Dispatch ${{ matrix.name }}
        run: |
          dry_run='${{ inputs.dry_run }}'
          dry_run="${dry_run:-false}"
          echo "Dispatching ${TARGET_REPO} ${TARGET_WORKFLOW} on ref=${TARGET_REF} dry_run=${dry_run}"
          if [ "${TARGET_WORKFLOW}" = "release.yml" ]; then
            # CI-mode ship: release.yml takes per-generator + platforms inputs.
            echo "  inputs: generator=${GENERATOR} platforms=${PLATFORMS}"
            gh workflow run "${TARGET_WORKFLOW}" \
              --repo "${TARGET_REPO}" \
              --ref "${TARGET_REF}" \
              -f version='' \
              -f "dry_run=${dry_run}" \
              -f "generator=${GENERATOR}" \
              -f "platforms=${PLATFORMS}"
          else
            # Local-mode ship: canary-local-mode.yml only takes dry_run; it
            # iterates both generators internally via its own matrix.
            gh workflow run "${TARGET_WORKFLOW}" \
              --repo "${TARGET_REPO}" \
              --ref "${TARGET_REF}" \
              -f "dry_run=${dry_run}"
          fi

      - name: Locate the dispatched run
        id: locate
        env:
          BASELINE: ${{ steps.baseline.outputs.baseline }}
        run: |
          # Poll up to 60s for the dispatched run to register. release.yml has
          # `concurrency: group: release` so a queued state is normal — the
          # run is still created, just not executing yet.
          for i in $(seq 1 12); do
            run_id=$(gh run list \
              --repo "${TARGET_REPO}" \
              --workflow "${TARGET_WORKFLOW}" \
              --event workflow_dispatch \
              --limit 1 \
              --json databaseId,createdAt \
              --jq ".[0] | select(.createdAt > \"${BASELINE}\") | .databaseId" \
              || true)
            if [ -n "${run_id}" ] && [ "${run_id}" != "null" ]; then
              run_url="https://github.com/${TARGET_REPO}/actions/runs/${run_id}"
              echo "Found dispatched run: ${run_url}"
              {
                echo "run_id=${run_id}"
                echo "run_url=${run_url}"
              } >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            echo "No run yet (attempt ${i}/12), sleeping 5s..."
            sleep 5
          done
          echo "::error::Dispatched workflow but could not locate the resulting run within 60s."
          exit 1

      - name: Wait for dispatched run to finish
        env:
          RUN_ID: ${{ steps.locate.outputs.run_id }}
          RUN_URL: ${{ steps.locate.outputs.run_url }}
        run: |
          echo "Tailing run: ${RUN_URL}"
          # Up to 50 minutes (release pipeline typically completes in 5-7m;
          # 50m absorbs any GitHub Actions queue backpressure).
          for i in $(seq 1 100); do
            payload=$(gh run view "${RUN_ID}" --repo "${TARGET_REPO}" --json status,conclusion)
            status=$(echo "${payload}" | jq -r '.status')
            conclusion=$(echo "${payload}" | jq -r '.conclusion // ""')
            ts=$(date -u +%H:%M:%S)
            echo "[${ts}] poll ${i}/100 — status=${status} conclusion=${conclusion:-pending}"
            if [ "${status}" = "completed" ]; then
              if [ "${conclusion}" = "success" ]; then
                echo "::notice::Smoketest release succeeded: ${RUN_URL}"
                exit 0
              else
                echo "::error::Smoketest release concluded with: ${conclusion} (${RUN_URL})"
                exit 1
              fi
            fi
            sleep 30
          done
          echo "::error::Dispatched run did not complete within 50 minutes (${RUN_URL})"
          exit 1

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CANARY_WEBHOOK }}
          CELL_NAME: ${{ matrix.name }}
          RUN_URL: ${{ steps.locate.outputs.run_url }}
          TRIGGER_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK:-}" ]; then
            echo "DISCORD_CANARY_WEBHOOK secret unset — skipping Discord notification."
            echo "(Optional: configure the secret to route canary failures to a Discord channel.)"
            exit 0
          fi
          # Discord webhook expects {"content": "..."} or {"embeds": [...]}.
          # Keep payload simple — links speak louder than prose for diagnosis.
          payload=$(jq -nc \
            --arg run   "${RUN_URL:-(unknown)}"     \
            --arg trig  "${TRIGGER_URL}"            \
            --arg cell  "${CELL_NAME}"              \
            '{ content: ":rotating_light: **Canary failed** — \($cell)\nSmoketest run: \($run)\nTrigger run: \($trig)" }')
          curl -fsSL -X POST -H 'Content-Type: application/json' -d "${payload}" "${DISCORD_WEBHOOK}" \
            && echo "Posted Discord notification." \
            || echo "::warning::Discord notification failed (webhook URL may be invalid; check secret). Continuing."
