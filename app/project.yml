# XcodeGen configuration for HelloApp.
# Generate the .xcodeproj with: xcodegen generate
# (https://github.com/yonaskolb/XcodeGen)

name: HelloApp

options:
  bundleIdPrefix: io.indiagrams
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  developmentLanguage: en
  generateEmptyDirectories: true
  groupSortPosition: top
  xcodeVersion: "15.0"
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "TEAM_ID_PLACEHOLDER"   # override via .env.local FASTLANE_TEAM_ID
    CODE_SIGN_STYLE: Automatic
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO

# ─── iOS app ──────────────────────────────────────────────────────────
targets:
  HelloApp-iOS:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: iOS
    info:
      path: iOS/Generated-Info.plist
      properties:
        CFBundleDisplayName: HelloApp
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.indiagrams.helloapp
        TARGETED_DEVICE_FAMILY: "1,2"           # iPhone + iPad
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_ENTITLEMENTS: iOS/HelloApp.entitlements
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSHumanReadableCopyright: ""

# ─── macOS app ────────────────────────────────────────────────────────
  HelloApp-macOS:
    type: application
    platform: macOS
    sources:
      - path: Shared
      - path: macOS
        excludes:
          # macOS/Resources/ holds the hand-rolled AppIcon.icns + source 1024 PNG.
          # The postCompileScript copies the .icns into the .app, overwriting
          # actool's broken 4-size .icns.
          - "Resources"
    info:
      path: macOS/Generated-Info.plist
      properties:
        CFBundleDisplayName: HelloApp
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.utilities
        NSHumanReadableCopyright: "TODO Copyright © 2026 Indiagram LLC. All rights reserved."
        NSPrincipalClass: NSApplication
        # CFBundleIconName intentionally NOT set — its presence makes Sonoma+
        # prefer Assets.car AppIcon (which has actool's broken 4-size set).
        # postCompileScript installs the hand-rolled .icns instead.
        CFBundleIconFile: AppIcon
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.indiagrams.helloapp
        CODE_SIGN_ENTITLEMENTS: macOS/HelloApp.entitlements
        # Suppress actool's auto-injection of CFBundleIconName=AppIcon. Empty
        # value = actool emits Assets.car as before but does not set the key,
        # so macOS reads CFBundleIconFile → our hand-rolled 10-size .icns.
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    postCompileScripts:
      - name: Overwrite actool's broken AppIcon.icns with hand-rolled 10-size version
        # actool emits a 4-size .icns regardless of catalog input — missing
        # 64/256/512/1024. ci/gen-macos-icons.swift produces a complete .icns
        # committed at macOS/Resources/AppIcon.icns; copy it over actool's
        # output BEFORE Code Sign so the .app ships with all 10 sizes.
        inputFiles:
          - $(SRCROOT)/macOS/Resources/AppIcon.icns
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/AppIcon.icns
        script: |
          set -euo pipefail
          /bin/cp "$SCRIPT_INPUT_FILE_0" "$SCRIPT_OUTPUT_FILE_0"
          echo "Overwrote $SCRIPT_OUTPUT_FILE_0 with hand-rolled 10-size .icns"

# ─── UITest target (drives App Store screenshot capture) ────────────────────
  HelloAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.indiagrams.helloapp.uitests
        TEST_TARGET_NAME: HelloApp-iOS
        GENERATE_INFOPLIST_FILE: YES
        # SnapshotHelper.swift uses raw NSURLConnection patterns that warn
        # under strict concurrency — relax for the test target only.
        SWIFT_STRICT_CONCURRENCY: minimal
    dependencies:
      - target: HelloApp-iOS

# ─── macOS UITest target (drives App Store screenshot capture) ─────────────
  HelloAppMacOSUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: MacOSUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.indiagrams.helloapp.macuitests
        TEST_TARGET_NAME: HelloApp-macOS
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: HelloApp-macOS

# ─── Schemes ──────────────────────────────────────────────────────────
schemes:
  HelloApp-iOS:
    build:
      targets:
        HelloApp-iOS: all
        HelloAppUITests: [test]
    run:
      config: Debug
      executable: HelloApp-iOS
    test:
      config: Debug
      targets:
        - HelloAppUITests
    archive:
      config: Release

  HelloApp-macOS:
    build:
      targets:
        HelloApp-macOS: all
        HelloAppMacOSUITests: [test]
    run:
      config: Debug
      executable: HelloApp-macOS
    test:
      config: Debug
      targets:
        - HelloAppMacOSUITests
    archive:
      config: Release
